<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprechen — Speaking Game</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#072614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprechen">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8EE;
    --ink: #2D1B3D;
    --ink-soft: #6B5A7A;
    --coral: #FF6B5B;
    --coral-soft: #FF6B5B22;
    --yellow: #FFC857;
    --yellow-soft: #FFC85733;
    --mint: #6FE3C4;
    --mint-soft: #6FE3C433;
    --card: #FFFFFF;
    --border: #2D1B3D14;
    --shadow: #2D1B3D1f;
    --accent: #FF6B5B;
    --accent-soft: #FF6B5B22;
    --accent-shadow: #C94A3D;
  }

  body.dark-mode {
    --bg: #1A1A1A;
    --ink: #F0EEEA;
    --ink-soft: #9A9690;
    --coral: #FF8A72;
    --coral-soft: #FF8A7233;
    --yellow: #FFD174;
    --yellow-soft: #FFD17433;
    --mint: #6FE3C4;
    --mint-soft: #6FE3C433;
    --card: #262626;
    --border: #ffffff14;
    --shadow: #00000055;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 4rem;
  }

  main { max-width: 480px; margin: 0 auto; }

  h1, h2, .display {
    font-family: 'Fraunces', serif;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    margin: 0;
    color: var(--ink);
  }

  h1 span { color: var(--accent); }

  .profile-subtitle {
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin: 2px 0 0;
    font-weight: 600;
  }

  .profile-subtitle a {
    color: var(--accent);
    text-decoration: none;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .icon-toggle {
    background: var(--card);
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--shadow);
    transition: transform 0.1s;
  }

  .icon-toggle:active { transform: translateY(2px); box-shadow: 0 0 0 var(--shadow); }

  /* Level tabs */
  .level-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .level-tab {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    background: var(--card);
    border: none;
    border-radius: 14px;
    padding: 0.8rem 0.5rem;
    cursor: pointer;
    color: var(--ink-soft);
    box-shadow: 0 3px 0 var(--shadow);
    transition: transform 0.1s;
  }

  .level-tab:active { transform: translateY(2px); }

  .level-tab.active { background: var(--accent); color: white; }

  /* Ladder */
  .ladder-wrap {
    background: var(--card);
    border-radius: 20px;
    padding: 1.5rem 1.2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 0 var(--shadow);
  }

  .ladder-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 700;
    margin: 0 0 1rem;
    text-align: center;
  }

  .ladder-rungs {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 0.5rem;
  }

  .rung {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .rung-bar {
    width: 100%;
    border-radius: 8px 8px 4px 4px;
    background: var(--border);
    transition: all 0.3s;
  }

  .rung-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 0.85rem;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    color: var(--ink-soft);
  }

  .rung.done .rung-num { background: var(--accent); color: white; opacity: 0.6; }
  .rung.current .rung-num {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .rung.locked .rung-num { opacity: 0.3; }

  /* Challenge card */
  .challenge-card {
    background: var(--card);
    border-radius: 24px;
    padding: 1.8rem 1.4rem;
    text-align: center;
    box-shadow: 0 5px 0 var(--shadow);
    margin-bottom: 1.2rem;
  }

  .challenge-rung-badge {
    display: inline-block;
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 1rem;
    color: white;
  }

  .challenge-prompt {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 1.5rem;
    color: var(--ink);
  }

  .play-btn {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 0.9rem 2.2rem;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--accent-shadow);
    transition: transform 0.1s;
  }

  .play-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--accent-shadow); }

  .skip-link {
    display: block;
    margin: 0.8rem auto 0;
    font-size: 0.85rem;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }

  .time-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1.2rem;
  }

  .time-chip {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s;
  }

  .time-chip.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--ink);
  }

  /* Stats strip */
  .stats-strip {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-pill {
    flex: 1;
    background: var(--card);
    border-radius: 14px;
    padding: 0.7rem 0.5rem;
    text-align: center;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .stat-pill .num {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 700;
    display: block;
    color: var(--accent);
  }

  .stat-pill .label {
    font-size: 0.65rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
  }

  /* Game/recording screen */
  .game-screen { text-align: center; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 1.2rem;
    font-family: 'Inter', sans-serif;
  }

  .game-prompt-card {
    background: var(--card);
    border-radius: 24px;
    padding: 1.6rem 1.3rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 5px 0 var(--shadow);
  }

  .game-prompt-text {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 0;
  }

  /* Game clock - playful, not exam-like */
  .game-clock-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 1.2rem;
  }

  .game-clock-wrap svg { transform: rotate(-90deg); }

  .clock-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 14;
  }

  .clock-fill {
    fill: none;
    stroke: var(--mint);
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }

  .clock-fill.warm { stroke: var(--yellow); }
  .clock-fill.hot { stroke: var(--coral); }

  .mic-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 2.2rem;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--accent-shadow);
    transition: transform 0.1s;
  }

  .mic-button:active { transform: translate(-50%, -50%) translateY(3px); }

  .mic-button.recording {
    background: var(--mint);
    box-shadow: 0 5px 0 #4BBE9F;
    animation: bob 1s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.06); }
  }

  .clock-label {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
  }

  .live-words {
    min-height: 50px;
    background: var(--card);
    border-radius: 16px;
    padding: 1rem 1.1rem;
    font-size: 0.95rem;
    color: var(--ink-soft);
    margin-bottom: 1.2rem;
    text-align: left;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .live-words.has-text { color: var(--ink); font-weight: 600; }

  .mic-permission-note {
    font-size: 0.8rem;
    color: var(--ink-soft);
    background: var(--yellow-soft);
    border-radius: 14px;
    padding: 0.7rem 1rem;
    margin-bottom: 1.2rem;
  }

  .game-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    padding: 0.75rem 1.4rem;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .btn:active { transform: translateY(2px); }

  .btn-primary { background: var(--accent); color: white; box-shadow: 0 3px 0 var(--accent-shadow); }
  .btn-primary:active { box-shadow: 0 1px 0 var(--accent-shadow); }
  .btn-secondary { background: var(--card); color: var(--ink-soft); box-shadow: 0 3px 0 var(--shadow); }

  /* Results: pass/fail moment */
  .result-screen { text-align: center; }

  .result-badge {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .result-badge.pass { background: var(--mint-soft); }
  .result-badge.fail { background: var(--coral-soft); }

  .result-title {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin: 0 0 0.3rem;
  }

  .result-sub {
    font-size: 0.9rem;
    color: var(--ink-soft);
    margin: 0 0 1.5rem;
  }

  .result-stats {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .result-stat {
    flex: 1;
    background: var(--card);
    border-radius: 14px;
    padding: 0.7rem 0.4rem;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .result-stat .val {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .result-stat .lbl {
    font-size: 0.62rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-weight: 700;
  }

  .transcript-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1rem 1.1rem;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .tb-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-weight: 700;
  }

  .override-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .override-label {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-bottom: 0.6rem;
    font-weight: 700;
  }

  .thumb-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--shadow);
    transition: transform 0.1s;
  }

  .thumb-btn:active { transform: translateY(2px); }
  .thumb-btn.selected.up { background: var(--mint-soft); box-shadow: 0 3px 0 var(--mint); }
  .thumb-btn.selected.down { background: var(--coral-soft); box-shadow: 0 3px 0 var(--coral); }

  /* History */
  .history-item {
    background: var(--card);
    border-radius: 16px;
    padding: 0.9rem 1rem;
    margin-bottom: 8px;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .history-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    align-items: baseline;
  }

  .history-result {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 0.9rem;
  }

  .history-result.pass { color: #3D9B82; }
  .history-result.fail { color: #C94A3D; }

  .history-meta {
    font-size: 0.72rem;
    color: var(--ink-soft);
    font-weight: 700;
  }

  .history-prompt {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin: 0;
  }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
    padding: 2rem 1rem;
  }

  /* Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 1000;
  }

  .modal {
    background: var(--bg);
    border-radius: 24px;
    padding: 1.5rem 1.3rem;
    max-width: 380px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 10px 0 var(--shadow);
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 800;
    margin: 0 0 1rem;
    color: var(--ink);
  }

  .modal-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ink-soft);
    margin: 1rem 0 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .modal input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.65rem 0.85rem;
    border: none;
    border-radius: 12px;
    background: var(--card);
    color: var(--ink);
  }

  .modal input:focus { outline: 2px solid var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 1.3rem;
  }

  .profile-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 0.5rem;
  }

  .profile-list-row {
    display: flex;
    gap: 8px;
  }

  .profile-pick-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 700;
    background: var(--card);
    border: none;
    border-radius: 14px;
    padding: 0.7rem 0.9rem;
    cursor: pointer;
    color: var(--ink);
    text-align: left;
    box-shadow: 0 2px 0 var(--shadow);
  }

  .profile-edit-icon {
    background: var(--card);
    border: none;
    border-radius: 14px;
    width: 42px;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--shadow);
  }

  .avatar-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .avatar-picker button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--card);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--shadow);
  }

  .avatar-picker button.selected {
    border-color: var(--accent);
  }

  .avatar-chip {
    font-size: 1rem;
  }

  footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-soft);
  }

  .hidden { display: none !important; }

  @media (max-width: 420px) {
    .challenge-prompt, .game-prompt-text { font-size: 1.15rem; }
    .game-clock-wrap { width: 180px; height: 180px; }
  }
</style>
</head>
<body>
<main>

  <!-- HOME SCREEN -->
  <div id="homeScreen">
    <header>
      <div>
        <h1>sprech<span>en</span></h1>
        <p class="profile-subtitle"><span id="profileLabel"></span> &middot; <a href="#" id="switchProfileLink">switch</a></p>
      </div>
      <div class="header-actions">
        <button class="icon-toggle" id="darkModeToggle" title="Toggle dark mode">🌙</button>
        <button class="icon-toggle" id="historyLink" title="History">📋</button>
      </div>
    </header>

    <div class="level-tabs" id="levelTabs"></div>

    <div class="ladder-wrap">
      <p class="ladder-title" id="ladderTitle">Your ladder</p>
      <div class="ladder-rungs" id="ladderRungs"></div>
    </div>

    <div class="challenge-card" id="challengeCard">
      <span class="challenge-rung-badge" id="challengeRungBadge"></span>
      <p class="challenge-prompt" id="challengePromptText"></p>
      <div class="time-picker" id="timePicker"></div>
      <button class="play-btn" id="playBtn">▶ Speak now</button>
      <button class="skip-link" id="skipPromptBtn">Show a different one</button>
    </div>

    <div class="stats-strip" id="statsStrip"></div>

    <footer>Made with ☕ and ❤️ — Yogitha</footer>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="game-screen hidden">
    <button class="back-link" id="exitGameBtn">← Back</button>

    <div class="game-prompt-card">
      <p class="game-prompt-text" id="gamePromptText"></p>
    </div>

    <div class="mic-permission-note hidden" id="micNote">
      🎙️ This needs mic access to hear you. Your browser will ask permission.
    </div>

    <div class="game-clock-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle class="clock-track" cx="100" cy="100" r="86"></circle>
        <circle class="clock-fill" id="clockFill" cx="100" cy="100" r="86"
          stroke-dasharray="540" stroke-dashoffset="0"></circle>
      </svg>
      <button class="mic-button" id="micBtn">🎤</button>
    </div>
    <p class="clock-label" id="clockLabel">0:00</p>

    <div class="live-words" id="liveWords">Tap the mic and start talking…</div>

    <div class="game-actions">
      <button class="btn btn-secondary hidden" id="discardBtn">Restart</button>
      <button class="btn btn-primary hidden" id="finishBtn">Done!</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="result-screen hidden">
    <button class="back-link" id="resultBackBtn">← Back</button>

    <div id="resultBadge" class="result-badge"></div>
    <p class="result-title" id="resultTitle"></p>
    <p class="result-sub" id="resultSub"></p>

    <div class="result-stats" id="resultStats"></div>

    <div class="transcript-box">
      <p class="tb-label">The prompt</p>
      <p id="resultPromptOriginal"></p>
      <p id="resultPromptTranslation" style="color:var(--ink-soft); font-style:italic; margin-top:6px;"></p>
    </div>

    <div class="transcript-box">
      <p class="tb-label">What you said</p>
      <p id="resultTranscript"></p>
      <p id="resultTranscriptTranslation" style="color:var(--ink-soft); font-style:italic; margin-top:6px;"></p>
    </div>

    <p class="override-label">You be the judge</p>
    <div class="override-row" id="overrideRow">
      <button class="thumb-btn down" data-pass="false">👎</button>
      <button class="thumb-btn up" data-pass="true">👍</button>
    </div>

    <div class="game-actions">
      <button class="btn btn-secondary" id="retryBtn">🔁 Do it again</button>
      <button class="btn btn-primary" id="nextBtn">Next prompt →</button>
    </div>
  </div>

  <!-- HISTORY SCREEN -->
  <div id="historyScreen" class="hidden">
    <button class="back-link" id="historyBackBtn">← Back</button>
    <h1 style="font-size:1.4rem; margin-bottom:1rem;">Your sessions</h1>
    <div id="historyList"></div>
  </div>

  <!-- PROFILE PICKER MODAL -->
  <div class="modal-overlay hidden" id="profileOverlay">
    <div class="modal">
      <p class="modal-title">Who's playing?</p>
      <div class="profile-list" id="profileList"></div>
      <label class="modal-label" for="newProfileInput">Or add a new name</label>
      <input id="newProfileInput" autocomplete="off" placeholder="Your name" />
      <label class="modal-label">Pick an avatar</label>
      <div class="avatar-picker" id="emojiPicker"></div>
      <label class="modal-label">Pick a color</label>
      <div class="avatar-picker" id="colorPicker"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="profileGoBtn" type="button">Let's go</button>
      </div>
    </div>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div class="modal-overlay hidden" id="editProfileOverlay">
    <div class="modal">
      <p class="modal-title">Edit profile</p>
      <label class="modal-label" for="editProfileName">Name</label>
      <input id="editProfileName" autocomplete="off" />
      <label class="modal-label">Avatar</label>
      <div class="avatar-picker" id="editEmojiPicker"></div>
      <label class="modal-label">Color</label>
      <div class="avatar-picker" id="editColorPicker"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="editProfileCancelBtn" type="button">Cancel</button>
        <button class="btn btn-primary" id="editProfileSaveBtn" type="button">Save</button>
      </div>
    </div>
  </div>

</main>
<script>
const PROMPT_BANK = {
  A1: {
    color: '#6FE3C4',
    rungs: {
      1: ["Wie heißt du?","Wie alt bist du?","Woher kommst du?","Was isst du gern?","Magst du Kaffee oder Tee?"],
      2: ["Was machst du am Morgen?","Wo wohnst du?","Hast du Geschwister?","Was ist dein Lieblingstier?","Welche Farbe magst du am liebsten?"],
      3: ["Beschreibe deine Familie kurz.","Was machst du am Wochenende?","Was isst du normalerweise zum Frühstück?","Welche Sprachen sprichst du?","Wie kommst du zur Arbeit oder zur Schule?"],
      4: ["Was sind deine Hobbys?","Beschreibe dein Zimmer.","Wie ist das Wetter heute?","Was machst du, wenn es regnet?","Erzähl von deinem Lieblingstag der Woche."],
      5: ["Beschreibe deinen Tagesablauf von morgens bis abends.","Erzähl etwas über deine beste Freundin oder deinen besten Freund.","Was machst du gern in deiner Freizeit, und warum?","Beschreibe dein Lieblingsessen und wie man es macht."]
    }
  },
  A2: {
    color: '#FFC857',
    rungs: {
      1: ["Was hast du gestern gemacht?","Wohin fährst du gern im Urlaub?","Was machst du, um gesund zu bleiben?","Was kaufst du oft im Supermarkt?","Wie war dein letztes Wochenende?"],
      2: ["Erzähl von deiner letzten Reise.","Beschreibe deine Traumwohnung.","Was gefällt dir an deiner Stadt?","Wie oft treibst du Sport, und welchen?","Was machst du, wenn du dich krank fühlst?"],
      3: ["Beschreibe einen typischen Arbeitstag.","Erzähl von einem Einkauf, der schiefgegangen ist.","Möchtest du lieber in der Stadt oder auf dem Land wohnen? Warum?","Wie hast du Deutsch gelernt?","Was war dein schönstes Reiseerlebnis?"],
      4: ["Erzähl von einem besonderen Tag in deinem Leben.","Was gefällt dir an deinem Job oder Studium, was nicht?","Hattest du schon mal einen schwierigen Tag bei der Arbeit? Erzähl davon.","Wie war deine Wohnung, als du ein Kind warst?","Was würdest du an deiner aktuellen Wohnung ändern?"],
      5: ["Was war die größte Veränderung in deinem Leben in den letzten Jahren?","Erzähl eine Geschichte von einer Reise, die nicht wie geplant lief.","Beschreibe, wie sich dein Alltag in den letzten Jahren verändert hat.","Vergleiche dein Leben jetzt mit deinem Leben vor fünf Jahren."]
    }
  },
  B1: {
    color: '#FF6B5B',
    rungs: {
      1: ["Was hältst du von sozialen Medien?","Isst du gern vegetarisch? Warum oder warum nicht?","Was ist wichtiger: Geld oder Zeit? Warum?","Magst du es, neue Leute kennenzulernen?","Was denkst du über Homeoffice?"],
      2: ["Was sind die Vor- und Nachteile, in einer Großstadt zu leben?","Sollten Handys in Schulen verboten werden? Begründe deine Meinung.","Wie wichtig ist Recycling in deinem Alltag?","Was kann man persönlich tun, um die Umwelt zu schützen?","Reist du lieber allein oder mit anderen? Warum?"],
      3: ["Wo siehst du dich in fünf Jahren?","Was denkst du über den Klimawandel?","Sollte man weniger Fleisch essen? Diskutiere kurz.","Ist es wichtiger, glücklich zu sein oder erfolgreich? Warum?","Diskutiere die Vor- und Nachteile vom Online-Lernen."],
      4: ["Erzähl von einer Entscheidung, die dein Leben verändert hat.","Beschreibe eine Situation, in der du eine schwierige Entscheidung treffen musstest.","Wie hat sich die Gesellschaft in den letzten zehn Jahren verändert?","Was war die größte Herausforderung, die du je gemeistert hast?","Erzähl von einem Missverständnis, das du mal hattest."],
      5: ["Manche meinen, Tests in der Schule seien unnötig. Was denkst du, und warum?","Ist es besser, in einer Beziehung die gleichen Interessen zu haben oder unterschiedliche? Begründe.","Sollte man immer die Wahrheit sagen, auch wenn sie weh tut? Diskutiere beide Seiten.","Erzähl eine Geschichte über jemanden, der dich inspiriert hat, und warum."]
    }
  }
};

const RUNG_COUNT = 5;
const TIME_PER_RUNG = { 1: 30, 2: 40, 3: 50, 4: 65, 5: 80 };

// ── State ─────────────────────────────────────────────────
const EMOJI_OPTIONS = ['🦕','🦖','🐉','🦴','🥚','🌋','🍃','🦎'];
const THEME_COLORS = ['#0B4D2E','#3A2E5C','#5C2E2E','#1F4B4B','#5C3D1F','#2E3B5C','#4B2E5C','#1F3D2E'];

let profile = null;
let currentAvatar = { emoji: null, color: null };
let selectedEmoji = EMOJI_OPTIONS[0];
let selectedColor = THEME_COLORS[0];

let currentLevel = 'A1';
let currentPrompt = null;
let currentRung = 1;
let selectedRung = 1;
let customTimeOverride = null; // null = use level default
let recognition = null;
let isRecording = false;
let finalTranscript = '';
let interimTranscript = '';
let sessionStartTime = null;
let timerInterval = null;
let elapsedSeconds = 0;
let lastResult = null;

function profileKey(suffix) {
  return `spiel-${suffix}-${profile}`;
}

function getKnownProfiles() {
  try { return JSON.parse(localStorage.getItem('spiel-profiles') || '[]'); }
  catch (e) { return []; }
}
function saveKnownProfiles(list) {
  localStorage.setItem('spiel-profiles', JSON.stringify(list));
}
function upsertKnownProfile(name, emoji, color) {
  const list = getKnownProfiles();
  const idx = list.findIndex(p => p.name === name);
  const entry = { name, emoji, color };
  if (idx >= 0) list[idx] = entry; else list.push(entry);
  saveKnownProfiles(list);
}

function getLadder() {
  try { return JSON.parse(localStorage.getItem(profileKey('ladder')) || '{}'); }
  catch (e) { return {}; }
}
function saveLadder(ladder) {
  localStorage.setItem(profileKey('ladder'), JSON.stringify(ladder));
}
function getRungFor(level) {
  const ladder = getLadder();
  return ladder[level] || 1;
}
function setRungFor(level, rung) {
  const ladder = getLadder();
  ladder[level] = Math.max(1, Math.min(RUNG_COUNT, rung));
  saveLadder(ladder);
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem(profileKey('history')) || '[]'); }
  catch (e) { return []; }
}
function saveHistoryEntry(entry) {
  const h = getHistory();
  h.unshift(entry);
  localStorage.setItem(profileKey('history'), JSON.stringify(h.slice(0, 200)));
}

function applyProfileTheme(color) {
  if (!color) return;
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-soft', color + '33');
  document.documentElement.style.setProperty('--accent-shadow', color);
}

function avatarChip(emoji) {
  return `<span class="avatar-chip">${emoji || ''}</span>`;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function show(id) {
  ['homeScreen','gameScreen','resultScreen','historyScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function pickPrompt(level, rung) {
  const options = PROMPT_BANK[level].rungs[rung];
  return options[Math.floor(Math.random() * options.length)];
}

// ── Home screen ───────────────────────────────────────────
function renderLevelTabs() {
  const el = document.getElementById('levelTabs');
  el.innerHTML = ['A1','A2','B1'].map(lvl =>
    `<button class="level-tab ${lvl === currentLevel ? 'active' : ''}" data-level="${lvl}">${lvl}</button>`
  ).join('');
  el.querySelectorAll('.level-tab').forEach(b => {
    b.addEventListener('click', () => {
      currentLevel = b.dataset.level;
      localStorage.setItem(profileKey('level'), currentLevel);
      currentRung = getRungFor(currentLevel);
      selectedRung = currentRung;
      renderHome();
    });
  });
}

function renderLadder() {
  currentRung = getRungFor(currentLevel);
  if (selectedRung > currentRung) selectedRung = currentRung;
  const el = document.getElementById('ladderRungs');
  const heights = [30, 42, 54, 66, 78];
  el.innerHTML = '';
  for (let i = 1; i <= RUNG_COUNT; i++) {
    const unlocked = i <= currentRung;
    const isSelected = i === selectedRung;
    const state = !unlocked ? 'locked' : isSelected ? 'current' : 'done';
    const rungDiv = document.createElement('div');
    rungDiv.className = `rung ${state}`;
    rungDiv.style.cursor = unlocked ? 'pointer' : 'default';
    rungDiv.innerHTML = `
      <div class="rung-bar" style="height:${heights[i-1]}px; background:${unlocked ? currentAvatar.color : ''};"></div>
      <div class="rung-num">${i}</div>
    `;
    if (unlocked) {
      rungDiv.addEventListener('click', () => {
        selectedRung = i;
        renderLadder();
        renderChallengeCard();
      });
    }
    el.appendChild(rungDiv);
  }
  document.getElementById('ladderTitle').textContent = `${currentLevel} levels · playing level ${selectedRung} of ${RUNG_COUNT}`;
}

function getEffectiveTimeLimit() {
  return customTimeOverride || TIME_PER_RUNG[selectedRung];
}

function renderTimePicker() {
  const el = document.getElementById('timePicker');
  if (currentLevel !== 'B1') {
    el.innerHTML = '';
    el.style.display = 'none';
    return;
  }
  el.style.display = 'flex';
  const defaultTime = TIME_PER_RUNG[selectedRung];
  const options = [10, 20, 30, 45, 60, 90].filter(t => t !== defaultTime);
  const chips = [
    { label: `Default (${defaultTime}s)`, value: null },
    ...options.map(t => ({ label: `${t}s`, value: t }))
  ];
  el.innerHTML = chips.map(c =>
    `<button type="button" class="time-chip ${customTimeOverride === c.value ? 'selected' : ''}" data-time="${c.value ?? ''}">${c.label}</button>`
  ).join('');
  el.querySelectorAll('.time-chip').forEach(b => {
    b.addEventListener('click', () => {
      const v = b.dataset.time;
      customTimeOverride = v === '' ? null : parseInt(v);
      renderTimePicker();
    });
  });
}

function renderChallengeCard() {
  currentPrompt = pickPrompt(currentLevel, selectedRung);
  customTimeOverride = null;
  const badge = document.getElementById('challengeRungBadge');
  badge.textContent = `Level ${selectedRung}`;
  badge.style.background = currentAvatar.color;
  document.getElementById('challengePromptText').textContent = currentPrompt;
  renderTimePicker();
}

function renderStats() {
  const history = getHistory().filter(h => h.level === currentLevel);
  const el = document.getElementById('statsStrip');
  const count = history.length;
  const passes = history.filter(h => h.pass).length;
  const passRate = count > 0 ? Math.round((passes / count) * 100) : 0;
  el.innerHTML = `
    <div class="stat-pill"><span class="num">${count}</span><span class="label">Rounds</span></div>
    <div class="stat-pill"><span class="num">${passRate || '—'}${count ? '%' : ''}</span><span class="label">Pass rate</span></div>
    <div class="stat-pill"><span class="num">${currentRung}</span><span class="label">Unlocked level</span></div>
  `;
}

function renderHome() {
  renderLevelTabs();
  renderLadder();
  renderChallengeCard();
  renderStats();
}

document.getElementById('skipPromptBtn').addEventListener('click', renderChallengeCard);
document.getElementById('playBtn').addEventListener('click', () => startGame());
document.getElementById('historyLink').addEventListener('click', () => {
  renderHistoryScreen();
  show('historyScreen');
});
document.getElementById('historyBackBtn').addEventListener('click', () => show('homeScreen'));

// ── Game screen ───────────────────────────────────────────
function startGame() {
  finalTranscript = '';
  interimTranscript = '';
  elapsedSeconds = 0;
  isRecording = false;

  document.getElementById('gamePromptText').textContent = currentPrompt;
  document.getElementById('liveWords').textContent = 'Tap the mic and start talking…';
  document.getElementById('liveWords').classList.remove('has-text');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('discardBtn').classList.add('hidden');
  document.getElementById('finishBtn').classList.add('hidden');

  const limit = getEffectiveTimeLimit();
  updateClock(0, limit);

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  document.getElementById('micNote').classList.toggle('hidden', !!SpeechRecognition);

  show('gameScreen');
}

document.getElementById('exitGameBtn').addEventListener('click', () => {
  stopRecording();
  show('homeScreen');
});

function updateClock(elapsed, limit) {
  const remaining = Math.max(0, limit - elapsed);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('clockLabel').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  const fill = document.getElementById('clockFill');
  const circumference = 540;
  const fraction = Math.max(0, 1 - elapsed / limit);
  fill.style.strokeDashoffset = circumference * (1 - fraction);
  fill.classList.remove('warm', 'hot');
  if (fraction < 0.15) fill.classList.add('hot');
  else if (fraction < 0.4) fill.classList.add('warm');
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const limit = getEffectiveTimeLimit();

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const piece = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalTranscript += piece + ' ';
        else interim += piece;
      }
      interimTranscript = interim;
      updateLiveWords();
    };
    recognition.onerror = (e) => { if (e.error !== 'no-speech') console.warn(e.error); };
    recognition.onend = () => { if (isRecording) { try { recognition.start(); } catch (e) {} } };
    try { recognition.start(); } catch (e) {}
  }

  isRecording = true;
  sessionStartTime = Date.now();
  document.getElementById('micBtn').textContent = '⏹';
  document.getElementById('micBtn').classList.add('recording');

  timerInterval = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
    updateClock(elapsedSeconds, limit);
    if (elapsedSeconds >= limit) stopRecording();
  }, 250);
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('micBtn').classList.remove('recording');

  if ((finalTranscript + interimTranscript).trim().length > 0) {
    document.getElementById('discardBtn').classList.remove('hidden');
    document.getElementById('finishBtn').classList.remove('hidden');
  }
}

function updateLiveWords() {
  const el = document.getElementById('liveWords');
  const text = (finalTranscript + interimTranscript).trim();
  if (text) { el.textContent = text; el.classList.add('has-text'); }
}

document.getElementById('micBtn').addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    finalTranscript = '';
    interimTranscript = '';
    document.getElementById('liveWords').textContent = 'Listening…';
    document.getElementById('liveWords').classList.remove('has-text');
    document.getElementById('discardBtn').classList.add('hidden');
    document.getElementById('finishBtn').classList.add('hidden');
    startRecording();
  }
});

document.getElementById('discardBtn').addEventListener('click', () => {
  finalTranscript = '';
  interimTranscript = '';
  document.getElementById('liveWords').textContent = 'Tap the mic and start talking…';
  document.getElementById('liveWords').classList.remove('has-text');
  document.getElementById('discardBtn').classList.add('hidden');
  document.getElementById('finishBtn').classList.add('hidden');
});

document.getElementById('finishBtn').addEventListener('click', () => {
  stopRecording();
  scoreRound();
});

// ── Scoring ───────────────────────────────────────────────
const FILLER_WORDS = ['äh','ähm','also','halt','irgendwie','sozusagen'];

function scoreRound() {
  const transcript = (finalTranscript + interimTranscript).trim();
  const words = transcript.split(/\s+/).filter(Boolean);
  const wordCount = words.length;
  const limit = getEffectiveTimeLimit();
  const duration = Math.max(1, elapsedSeconds);
  const wpm = Math.round((wordCount / duration) * 60);
  const fillerCount = words.filter(w => FILLER_WORDS.includes(w.toLowerCase().replace(/[.,!?]/g, ''))).length;

  // Simple pass threshold: enough words spoken relative to rung expectations
  const minWordsForRung = { 1: 4, 2: 6, 3: 10, 4: 14, 5: 18 };
  const suggestedPass = wordCount >= minWordsForRung[selectedRung] && wpm >= 25;

  lastResult = {
    level: currentLevel,
    rung: selectedRung,
    prompt: currentPrompt,
    transcript: transcript || '(no speech detected)',
    wordCount, wpm, fillerCount, duration,
    suggestedPass,
    pass: suggestedPass,
    date: new Date().toISOString()
  };

  renderResult();
  show('resultScreen');
}

async function translateText(text, fromLang, toLang) {
  if (!text || text.trim().length === 0) return '';
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`;
    const res = await fetch(url);
    const data = await res.json();
    return data?.responseData?.translatedText || '';
  } catch (e) {
    return '';
  }
}

function renderResult() {
  const badge = document.getElementById('resultBadge');
  badge.className = 'result-badge ' + (lastResult.pass ? 'pass' : 'fail');
  badge.textContent = lastResult.pass ? '🎉' : '💪';

  const isFrontier = lastResult.rung === getRungFor(currentLevel);
  document.getElementById('resultTitle').textContent = lastResult.pass ? 'Nice one!' : 'Almost there!';
  document.getElementById('resultSub').textContent = isFrontier
    ? (lastResult.pass ? `Level ${lastResult.rung} cleared — climbing up!` : `Level ${lastResult.rung} — let's try an easier one next.`)
    : `Level ${lastResult.rung} — just practice, your progress is unchanged.`;

  document.getElementById('resultStats').innerHTML = `
    <div class="result-stat"><span class="val">${lastResult.wordCount}</span><span class="lbl">Words</span></div>
    <div class="result-stat"><span class="val">${lastResult.wpm}</span><span class="lbl">WPM</span></div>
    <div class="result-stat"><span class="val">${lastResult.duration}s</span><span class="lbl">Time</span></div>
  `;

  document.getElementById('resultPromptOriginal').textContent = lastResult.prompt;
  document.getElementById('resultTranscript').textContent = lastResult.transcript;

  const promptTransEl = document.getElementById('resultPromptTranslation');
  const transcriptTransEl = document.getElementById('resultTranscriptTranslation');
  promptTransEl.textContent = 'Translating…';
  transcriptTransEl.textContent = lastResult.transcript === '(no speech detected)' ? '' : 'Translating…';

  translateText(lastResult.prompt, 'de', 'en').then(t => {
    promptTransEl.textContent = t || '';
  });
  if (lastResult.transcript && lastResult.transcript !== '(no speech detected)') {
    translateText(lastResult.transcript, 'de', 'en').then(t => {
      transcriptTransEl.textContent = t || '';
    });
  }

  const overrideRow = document.getElementById('overrideRow');
  overrideRow.querySelectorAll('.thumb-btn').forEach(b => {
    b.classList.remove('selected');
    if ((b.dataset.pass === 'true') === lastResult.pass) b.classList.add('selected');
  });

  const atFrontier = selectedRung === getRungFor(currentLevel);
  document.getElementById('nextBtn').textContent = atFrontier
    ? (lastResult.pass ? 'Climb up →' : 'Drop down →')
    : 'Back to levels →';
}

document.getElementById('overrideRow').querySelectorAll('.thumb-btn').forEach(b => {
  b.addEventListener('click', () => {
    lastResult.pass = b.dataset.pass === 'true';
    renderResult();
  });
});

document.getElementById('resultBackBtn').addEventListener('click', () => show('homeScreen'));
document.getElementById('retryBtn').addEventListener('click', () => startGame());

document.getElementById('nextBtn').addEventListener('click', () => {
  saveHistoryEntry(lastResult);
  const highest = getRungFor(currentLevel);
  // Only move the ladder if you were playing at your actual unlocked frontier.
  // Replaying an already-cleared lower level is just practice and doesn't change progress.
  if (selectedRung === highest) {
    let rung = highest;
    if (lastResult.pass) rung = Math.min(RUNG_COUNT, rung + 1);
    else rung = Math.max(1, rung - 1);
    setRungFor(currentLevel, rung);
    selectedRung = rung;
  }
  renderHome();
  show('homeScreen');
});

// ── History ───────────────────────────────────────────────
function renderHistoryScreen() {
  const history = getHistory();
  const el = document.getElementById('historyList');
  if (history.length === 0) {
    el.innerHTML = '<div class="empty-state">No rounds played yet. Go climb the ladder!</div>';
    return;
  }
  el.innerHTML = history.map(h => {
    const date = new Date(h.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="history-item">
        <div class="history-top">
          <span class="history-result ${h.pass ? 'pass' : 'fail'}">${h.pass ? '👍 Pass' : '👎 Try again'}</span>
          <span class="history-meta">${h.level} · Level ${h.rung} · ${date}</span>
        </div>
        <p class="history-prompt">${escapeHtml(h.prompt)}</p>
      </div>
    `;
  }).join('');
}

// ── Dark mode ─────────────────────────────────────────────
function applyDarkMode(dark) {
  document.body.classList.toggle('dark-mode', dark);
  document.getElementById('darkModeToggle').textContent = dark ? '☀️' : '🌙';
  try { localStorage.setItem('spiel-dark-mode', dark ? '1' : '0'); } catch (e) {}
}

document.getElementById('darkModeToggle').addEventListener('click', () => {
  const isDark = document.body.classList.contains('dark-mode');
  applyDarkMode(!isDark);
});

function initDarkMode() {
  let saved = '1';
  try { saved = localStorage.getItem('spiel-dark-mode') ?? '1'; } catch (e) {}
  applyDarkMode(saved === '1');
}

// ── Profile picker ────────────────────────────────────────
function renderAvatarPickers() {
  const emojiEl = document.getElementById('emojiPicker');
  emojiEl.innerHTML = EMOJI_OPTIONS.map(e =>
    `<button type="button" data-emoji="${e}" class="${e === selectedEmoji ? 'selected' : ''}">${e}</button>`
  ).join('');
  emojiEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { selectedEmoji = b.dataset.emoji; renderAvatarPickers(); });
  });

  const colorEl = document.getElementById('colorPicker');
  colorEl.innerHTML = THEME_COLORS.map(c =>
    `<button type="button" data-color="${c}" class="${c === selectedColor ? 'selected' : ''}" style="background:${c};"></button>`
  ).join('');
  colorEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { selectedColor = b.dataset.color; renderAvatarPickers(); });
  });
}

function showProfilePicker() {
  const known = getKnownProfiles();
  const list = document.getElementById('profileList');
  list.innerHTML = known.map(p => `
    <div class="profile-list-row">
      <button class="profile-pick-btn" data-profile="${escapeHtml(p.name)}">${avatarChip(p.emoji)} ${escapeHtml(p.name)}</button>
      <button class="profile-edit-icon" data-profile="${escapeHtml(p.name)}" data-emoji="${escapeHtml(p.emoji || '')}" data-color="${escapeHtml(p.color || '')}" aria-label="Edit">✏️</button>
    </div>
  `).join('');
  list.querySelectorAll('.profile-pick-btn').forEach(b => {
    b.addEventListener('click', () => selectProfile(b.dataset.profile));
  });
  list.querySelectorAll('.profile-edit-icon').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      openEditProfileModal(b.dataset.profile, b.dataset.emoji, b.dataset.color);
    });
  });
  selectedEmoji = EMOJI_OPTIONS[Math.floor(Math.random() * EMOJI_OPTIONS.length)];
  selectedColor = THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)];
  renderAvatarPickers();
  document.getElementById('newProfileInput').value = '';
  document.getElementById('profileOverlay').classList.remove('hidden');
}

function selectProfile(name) {
  name = name.trim();
  if (!name) return;
  const known = getKnownProfiles();
  const existing = known.find(p => p.name === name);
  if (existing) {
    currentAvatar = { emoji: existing.emoji, color: existing.color };
  } else {
    currentAvatar = { emoji: selectedEmoji, color: selectedColor };
    upsertKnownProfile(name, selectedEmoji, selectedColor);
  }
  profile = name;
  try { localStorage.setItem('spiel-current-profile', profile); } catch (e) {}
  document.getElementById('profileOverlay').classList.add('hidden');
  document.getElementById('profileLabel').innerHTML = avatarChip(currentAvatar.emoji) + ' ' + escapeHtml(profile);
  applyProfileTheme(currentAvatar.color);

  let savedLevel = 'A1';
  try { savedLevel = localStorage.getItem(profileKey('level')) || 'A1'; } catch (e) {}
  currentLevel = savedLevel;
  currentRung = getRungFor(currentLevel);
  selectedRung = currentRung;
  renderHome();
  show('homeScreen');
}

document.getElementById('profileGoBtn').addEventListener('click', () => {
  const input = document.getElementById('newProfileInput');
  const name = input.value.trim();
  if (name) selectProfile(name);
});
document.getElementById('newProfileInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('profileGoBtn').click();
});

document.getElementById('switchProfileLink').addEventListener('click', (e) => {
  e.preventDefault();
  showProfilePicker();
});

// ── Edit profile ──────────────────────────────────────────
let editingProfileName = null;
let editingEmoji = null;
let editingColor = null;

function renderEditPickers() {
  const emojiEl = document.getElementById('editEmojiPicker');
  emojiEl.innerHTML = EMOJI_OPTIONS.map(e =>
    `<button type="button" data-emoji="${e}" class="${e === editingEmoji ? 'selected' : ''}">${e}</button>`
  ).join('');
  emojiEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { editingEmoji = b.dataset.emoji; renderEditPickers(); });
  });

  const colorEl = document.getElementById('editColorPicker');
  colorEl.innerHTML = THEME_COLORS.map(c =>
    `<button type="button" data-color="${c}" class="${c === editingColor ? 'selected' : ''}" style="background:${c};"></button>`
  ).join('');
  colorEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { editingColor = b.dataset.color; renderEditPickers(); });
  });
}

function openEditProfileModal(name, emoji, color) {
  editingProfileName = name;
  editingEmoji = emoji || EMOJI_OPTIONS[0];
  editingColor = color || THEME_COLORS[0];
  document.getElementById('editProfileName').value = name;
  renderEditPickers();
  document.getElementById('editProfileOverlay').classList.remove('hidden');
}

document.getElementById('editProfileCancelBtn').addEventListener('click', () => {
  document.getElementById('editProfileOverlay').classList.add('hidden');
});

document.getElementById('editProfileSaveBtn').addEventListener('click', () => {
  const newName = document.getElementById('editProfileName').value.trim();
  if (!newName || !editingProfileName) return;
  const oldName = editingProfileName;

  if (newName !== oldName) {
    // Move ladder/history/level data to new key
    ['ladder','history','level'].forEach(suffix => {
      const oldVal = localStorage.getItem(`spiel-${suffix}-${oldName}`);
      if (oldVal !== null) {
        localStorage.setItem(`spiel-${suffix}-${newName}`, oldVal);
        localStorage.removeItem(`spiel-${suffix}-${oldName}`);
      }
    });
    const known = getKnownProfiles().filter(p => p.name !== oldName);
    saveKnownProfiles(known);
  }

  upsertKnownProfile(newName, editingEmoji, editingColor);

  if (profile === oldName) {
    profile = newName;
    currentAvatar = { emoji: editingEmoji, color: editingColor };
    try { localStorage.setItem('spiel-current-profile', profile); } catch (e) {}
    document.getElementById('profileLabel').innerHTML = avatarChip(editingEmoji) + ' ' + escapeHtml(profile);
    applyProfileTheme(editingColor);
  }

  document.getElementById('editProfileOverlay').classList.add('hidden');
  showProfilePicker();
});

// ── Init ──────────────────────────────────────────────────
initDarkMode();
(function init() {
  let saved = '';
  try { saved = localStorage.getItem('spiel-current-profile') || ''; } catch (e) {}
  if (saved && getKnownProfiles().some(p => p.name === saved)) {
    selectProfile(saved);
  } else {
    showProfilePicker();
  }
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then((reg) => {
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') reg.update().catch(() => {});
      });
    }).catch(() => {});

    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}

// iOS install button
(function() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    const btn = document.createElement('button');
    btn.textContent = '⬇️ Add to Home Screen';
    btn.style.cssText = "display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:1.2rem;font-family:'Fraunces',serif;font-size:0.9rem;font-weight:600;background:var(--accent);color:white;border:none;border-radius:14px;padding:0.7rem;cursor:pointer;box-shadow:0 3px 0 var(--accent-shadow);";
    btn.addEventListener('click', () => {
      alert('To install: tap the Share button in Safari\'s toolbar, then choose "Add to Home Screen."');
    });
    const footer = document.querySelector('#homeScreen footer');
    if (footer) footer.parentNode.insertBefore(btn, footer);
  }
})();
</script>
