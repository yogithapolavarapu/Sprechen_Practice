<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprechen — Speaking Game</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#072614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprechen">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #FFF8EE;
    --ink: #2D1B3D;
    --ink-soft: #6B5A7A;
    --coral: #FF6B5B;
    --coral-soft: #FF6B5B22;
    --yellow: #FFC857;
    --yellow-soft: #FFC85733;
    --mint: #6FE3C4;
    --mint-soft: #6FE3C433;
    --card: #FFFFFF;
    --border: #2D1B3D14;
    --shadow: #2D1B3D1f;
    --accent: #FF6B5B;
    --accent-soft: #FF6B5B22;
    --accent-shadow: #C94A3D;
  }

  body.dark-mode {
    --bg: #1A1A1A;
    --ink: #F0EEEA;
    --ink-soft: #9A9690;
    --coral: #FF8A72;
    --coral-soft: #FF8A7233;
    --yellow: #FFD174;
    --yellow-soft: #FFD17433;
    --mint: #6FE3C4;
    --mint-soft: #6FE3C433;
    --card: #262626;
    --border: #ffffff14;
    --shadow: #00000055;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 4rem;
  }

  main { max-width: 480px; margin: 0 auto; }

  h1, h2, .display {
    font-family: 'Fraunces', serif;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    margin: 0;
    color: var(--ink);
  }

  h1 span { color: var(--accent); }

  .profile-subtitle {
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin: 2px 0 0;
    font-weight: 600;
  }

  .profile-subtitle a {
    color: var(--accent);
    text-decoration: none;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .icon-toggle {
    background: var(--card);
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--shadow);
    transition: transform 0.1s;
  }

  .icon-toggle:active { transform: translateY(2px); box-shadow: 0 0 0 var(--shadow); }

  /* Level tabs */
  .level-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .level-tab {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    background: var(--card);
    border: none;
    border-radius: 14px;
    padding: 0.8rem 0.5rem;
    cursor: pointer;
    color: var(--ink-soft);
    box-shadow: 0 3px 0 var(--shadow);
    transition: transform 0.1s;
  }

  .level-tab:active { transform: translateY(2px); }

  .level-tab.active { background: var(--accent); color: white; }

  /* Ladder */
  .ladder-wrap {
    background: var(--card);
    border-radius: 20px;
    padding: 1.5rem 1.2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 0 var(--shadow);
  }

  .ladder-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 700;
    margin: 0 0 1rem;
    text-align: center;
  }

  .ladder-rungs {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 0.5rem;
  }

  .rung {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .rung-bar {
    width: 100%;
    border-radius: 8px 8px 4px 4px;
    background: var(--border);
    transition: all 0.3s;
  }

  .rung-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 0.85rem;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    color: var(--ink-soft);
  }

  .rung.done .rung-num { background: var(--accent); color: white; opacity: 0.6; }
  .rung.current .rung-num {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .rung.locked .rung-num { opacity: 0.3; }

  /* Challenge card */
  .challenge-card {
    background: var(--card);
    border-radius: 24px;
    padding: 1.8rem 1.4rem;
    text-align: center;
    box-shadow: 0 5px 0 var(--shadow);
    margin-bottom: 1.2rem;
  }

  .challenge-rung-badge {
    display: inline-block;
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 1rem;
    color: white;
  }

  .challenge-prompt {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 1.5rem;
    color: var(--ink);
  }

  .play-btn {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 0.9rem 2.2rem;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--accent-shadow);
    transition: transform 0.1s;
  }

  .play-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--accent-shadow); }

  .skip-link {
    display: block;
    margin: 0.8rem auto 0;
    font-size: 0.85rem;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }

  .time-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1.2rem;
  }

  .time-chip {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s;
  }

  .time-chip.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--ink);
  }

  /* Stats strip */
  .stats-strip {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-pill {
    flex: 1;
    background: var(--card);
    border-radius: 14px;
    padding: 0.7rem 0.5rem;
    text-align: center;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .stat-pill .num {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 700;
    display: block;
    color: var(--accent);
  }

  .stat-pill .label {
    font-size: 0.65rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
  }

  /* Game/recording screen */
  .game-screen { text-align: center; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 1.2rem;
    font-family: 'Inter', sans-serif;
  }

  .game-prompt-card {
    background: var(--card);
    border-radius: 24px;
    padding: 1.6rem 1.3rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 5px 0 var(--shadow);
  }

  .game-prompt-text {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 0;
  }

  /* Game clock - playful, not exam-like */
  .game-clock-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 1.2rem;
  }

  .game-clock-wrap svg { transform: rotate(-90deg); }

  .clock-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 14;
  }

  .clock-fill {
    fill: none;
    stroke: var(--mint);
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }

  .clock-fill.warm { stroke: var(--yellow); }
  .clock-fill.hot { stroke: var(--coral); }

  .mic-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 2.2rem;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--accent-shadow);
    transition: transform 0.1s;
  }

  .mic-button:active { transform: translate(-50%, -50%) translateY(3px); }

  .mic-button.recording {
    background: var(--mint);
    box-shadow: 0 5px 0 #4BBE9F;
    animation: bob 1s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.06); }
  }

  .clock-label {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
  }

  .live-words {
    min-height: 50px;
    background: var(--card);
    border-radius: 16px;
    padding: 1rem 1.1rem;
    font-size: 0.95rem;
    color: var(--ink-soft);
    margin-bottom: 1.2rem;
    text-align: left;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .live-words.has-text { color: var(--ink); font-weight: 600; }

  .mic-permission-note {
    font-size: 0.8rem;
    color: var(--ink-soft);
    background: var(--yellow-soft);
    border-radius: 14px;
    padding: 0.7rem 1rem;
    margin-bottom: 1.2rem;
  }

  .game-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    padding: 0.75rem 1.4rem;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .btn:active { transform: translateY(2px); }

  .btn-primary { background: var(--accent); color: white; box-shadow: 0 3px 0 var(--accent-shadow); }
  .btn-primary:active { box-shadow: 0 1px 0 var(--accent-shadow); }
  .btn-secondary { background: var(--card); color: var(--ink-soft); box-shadow: 0 3px 0 var(--shadow); }

  /* Results: pass/fail moment */
  .result-screen { text-align: center; }

  .result-badge {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .result-badge.pass { background: var(--mint-soft); }
  .result-badge.fail { background: var(--coral-soft); }

  .result-title {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin: 0 0 0.3rem;
  }

  .result-sub {
    font-size: 0.9rem;
    color: var(--ink-soft);
    margin: 0 0 1.5rem;
  }

  .result-stats {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .result-stat {
    flex: 1;
    background: var(--card);
    border-radius: 14px;
    padding: 0.7rem 0.4rem;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .result-stat .val {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .result-stat .lbl {
    font-size: 0.62rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-weight: 700;
  }

  .criteria-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1rem 1.1rem;
    text-align: left;
    margin-bottom: 1.5rem;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .criteria-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
  }

  .criteria-row:last-child { border-bottom: none; }

  .criteria-info { flex: 1; min-width: 0; }

  .criteria-name {
    font-family: 'Fraunces', serif;
    font-size: 0.92rem;
    font-weight: 600;
    margin: 0;
  }

  .criteria-desc {
    font-size: 0.72rem;
    color: var(--ink-soft);
    margin: 1px 0 0;
  }

  .criteria-bar-wrap {
    width: 70px;
    height: 6px;
    border-radius: 999px;
    background: var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }

  .criteria-bar-fill {
    height: 100%;
    border-radius: 999px;
  }

  .criteria-tier {
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
    width: 76px;
    text-align: right;
  }

  .overall-score-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .overall-score-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .overall-score-val {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
  }

  .transcript-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1rem 1.1rem;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .tb-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-weight: 700;
  }

  .override-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .override-toggle-btn {
    display: block;
    width: 100%;
    font-family: 'Fraunces', serif;
    font-size: 0.9rem;
    font-weight: 600;
    background: var(--card);
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 0.7rem 1rem;
    cursor: pointer;
    color: var(--ink-soft);
    margin-bottom: 1.5rem;
    transition: all 0.15s;
  }

  .override-toggle-btn:active { transform: translateY(1px); }
  .override-toggle-btn:hover { border-color: var(--accent); color: var(--ink); }

  /* History */
  .history-item {
    background: var(--card);
    border-radius: 16px;
    padding: 0.9rem 1rem;
    margin-bottom: 8px;
    box-shadow: 0 3px 0 var(--shadow);
  }

  .history-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    align-items: baseline;
  }

  .history-result {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 0.9rem;
  }

  .history-result.pass { color: #3D9B82; }
  .history-result.fail { color: #C94A3D; }

  .history-meta {
    font-size: 0.72rem;
    color: var(--ink-soft);
    font-weight: 700;
  }

  .history-prompt {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin: 0;
  }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
    padding: 2rem 1rem;
  }

  /* Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 1000;
  }

  .modal {
    background: var(--bg);
    border-radius: 24px;
    padding: 1.5rem 1.3rem;
    max-width: 380px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 10px 0 var(--shadow);
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 800;
    margin: 0 0 1rem;
    color: var(--ink);
  }

  .modal-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ink-soft);
    margin: 1rem 0 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .modal input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.65rem 0.85rem;
    border: none;
    border-radius: 12px;
    background: var(--card);
    color: var(--ink);
  }

  .modal input:focus { outline: 2px solid var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 1.3rem;
  }

  .profile-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 0.5rem;
  }

  .profile-list-row {
    display: flex;
    gap: 8px;
  }

  .profile-pick-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 700;
    background: var(--card);
    border: none;
    border-radius: 14px;
    padding: 0.7rem 0.9rem;
    cursor: pointer;
    color: var(--ink);
    text-align: left;
    box-shadow: 0 2px 0 var(--shadow);
  }

  .profile-edit-icon {
    background: var(--card);
    border: none;
    border-radius: 14px;
    width: 42px;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--shadow);
  }

  .avatar-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .avatar-picker button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--card);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--shadow);
  }

  .avatar-picker button.selected {
    border-color: var(--accent);
  }

  .avatar-chip {
    font-size: 1rem;
  }

  footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-soft);
  }

  .hidden { display: none !important; }

  @media (max-width: 420px) {
    .challenge-prompt, .game-prompt-text { font-size: 1.15rem; }
    .game-clock-wrap { width: 180px; height: 180px; }
  }
</style>
</head>
<body>
<main>

  <!-- HOME SCREEN -->
  <div id="homeScreen">
    <header>
      <div>
        <h1>sprech<span>en</span></h1>
        <p class="profile-subtitle"><span id="profileLabel"></span> &middot; <a href="#" id="switchProfileLink">switch</a></p>
      </div>
      <div class="header-actions">
        <button class="icon-toggle" id="darkModeToggle" title="Toggle dark mode">🌙</button>
        <button class="icon-toggle" id="historyLink" title="History">📋</button>
      </div>
    </header>

    <div class="level-tabs" id="levelTabs"></div>

    <div class="ladder-wrap">
      <p class="ladder-title" id="ladderTitle">Your ladder</p>
      <div class="ladder-rungs" id="ladderRungs"></div>
    </div>

    <div class="challenge-card" id="challengeCard">
      <span class="challenge-rung-badge" id="challengeRungBadge"></span>
      <p class="challenge-prompt" id="challengePromptText"></p>
      <div class="time-picker" id="timePicker"></div>
      <button class="play-btn" id="playBtn">▶ Speak now</button>
      <button class="skip-link" id="skipPromptBtn">Show a different one</button>
    </div>

    <div class="stats-strip" id="statsStrip"></div>

    <footer>Made with ☕ and ❤️ — Yogitha</footer>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="game-screen hidden">
    <button class="back-link" id="exitGameBtn">← Back</button>

    <div class="game-prompt-card">
      <p class="game-prompt-text" id="gamePromptText"></p>
    </div>

    <div class="mic-permission-note hidden" id="micNote">
      🎙️ This needs mic access to hear you. Your browser will ask permission.
    </div>

    <div class="game-clock-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">

let knownProfilesCache = [];
let ladderCache = {};       // { [level]: rung }
let historyCache = [];      // array of round entries, newest first

async function loadKnownProfiles() {
  try {
    const { data, error } = await sb.from('sprechen_profiles').select('*').order('created_at', { ascending: true });
    if (error) throw error;
    knownProfilesCache = (data || []).map(p => ({ name: p.name, emoji: p.emoji, color: p.color }));
  } catch (e) {
    knownProfilesCache = [];
  }
  return knownProfilesCache;
}

function getKnownProfiles() {
  return knownProfilesCache;
}

async function upsertKnownProfile(name, emoji, color) {
  const idx = knownProfilesCache.findIndex(p => p.name === name);
  const entry = { name, emoji, color };
  if (idx >= 0) knownProfilesCache[idx] = entry; else knownProfilesCache.push(entry);
  try {
    await sb.from('sprechen_profiles').upsert({ name, emoji, color });
  } catch (e) {}
}

async function renameProfile(oldName, newName, emoji, color) {
  try {
    await sb.from('sprechen_profiles').insert({ name: newName, emoji, color });
    await sb.from('sprechen_rounds').update({ profile: newName }).eq('profile', oldName);
    await sb.from('sprechen_ladder').update({ profile: newName }).eq('profile', oldName);
    await sb.from('sprechen_profiles').delete().eq('name', oldName);
  } catch (e) {}
  knownProfilesCache = knownProfilesCache.filter(p => p.name !== oldName);
  knownProfilesCache.push({ name: newName, emoji, color });
}

async function loadLadder() {
  ladderCache = {};
  try {
    const { data, error } = await sb.from('sprechen_ladder').select('*').eq('profile', profile);
    if (error) throw error;
    (data || []).forEach(row => { ladderCache[row.level] = row.rung; });
  } catch (e) {}
  return ladderCache;
}

function getRecentPromptsKey(level, rung) {
  return `spiel-recent-${profile}-${level}-${rung}`;
}

function getRecentPrompts(level, rung) {
  try {
    return JSON.parse(localStorage.getItem(getRecentPromptsKey(level, rung)) || '[]');
  } catch (e) {
    return [];
  }
}

function rememberPrompt(level, rung, promptText) {
  const options = PROMPT_BANK[level].rungs[rung];
  let recent = getRecentPrompts(level, rung);
  recent.push(promptText);
  // Keep at most (pool size - 1) remembered, so there's always at least one
  // fresh option left to pick from; older entries fall off first.
  const keepCount = Math.max(1, options.length - 1);
  recent = recent.slice(-keepCount);
  try {
    localStorage.setItem(getRecentPromptsKey(level, rung), JSON.stringify(recent));
  } catch (e) {}
}

function pickPrompt(level, rung) {
  const options = PROMPT_BANK[level].rungs[rung];
  const recent = getRecentPrompts(level, rung);
  let pool = options.filter(p => !recent.includes(p.text));
  // If everything in this rung has been shown recently (small pool), just
  // use the full set rather than getting stuck with nothing to pick from.
  if (pool.length === 0) pool = options;
  const chosen = pool[Math.floor(Math.random() * pool.length)];
  rememberPrompt(level, rung, chosen.text);
  return chosen;
}

    const state = !unlocked ? 'locked' : isSelected ? 'current' : 'done';
    const rungDiv = document.createElement('div');
    rungDiv.className = `rung ${state}`;
    rungDiv.style.cursor = unlocked ? 'pointer' : 'default';
    rungDiv.innerHTML = `
      <div class="rung-bar" style="height:${heights[i-1]}px; background:${unlocked ? currentAvatar.color : ''};"></div>

      rungDiv.addEventListener('click', () => {

// ── Game screen ───────────────────────────────────────────
function startGame() {
  finalTranscript = '';
  interimTranscript = '';
  speechTimestamps = [];
  elapsedSeconds = 0;
  isRecording = false;

  document.getElementById('gamePromptText').textContent = currentPrompt.text;
  document.getElementById('liveWords').textContent = 'Tap the mic and start talking…';
  document.getElementById('liveWords').classList.remove('has-text');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('discardBtn').classList.add('hidden');
  document.getElementById('finishBtn').classList.add('hidden');

  const limit = getEffectiveTimeLimit();
  updateClock(0, limit);

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  document.getElementById('micNote').classList.toggle('hidden', !!SpeechRecognition);

  show('gameScreen');
}

document.getElementById('exitGameBtn').addEventListener('click', () => {
  stopRecording();
  show('homeScreen');
});

function updateClock(elapsed, limit) {
  const remaining = Math.max(0, limit - elapsed);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('clockLabel').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  const fill = document.getElementById('clockFill');
  const circumference = 540;
  const fraction = Math.max(0, 1 - elapsed / limit);
  fill.style.strokeDashoffset = circumference * (1 - fraction);
  fill.classList.remove('warm', 'hot');
  if (fraction < 0.15) fill.classList.add('hot');
  else if (fraction < 0.4) fill.classList.add('warm');
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const limit = getEffectiveTimeLimit();

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const piece = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += piece + ' ';
          speechTimestamps.push(Date.now());
        } else {
          interim += piece;
        }
      }
      interimTranscript = interim;
      updateLiveWords();
    };
    recognition.onerror = (e) => { if (e.error !== 'no-speech') console.warn(e.error); };
    recognition.onend = () => { if (isRecording) { try { recognition.start(); } catch (e) {} } };
    try { recognition.start(); } catch (e) {}
  }

  isRecording = true;
  sessionStartTime = Date.now();
  document.getElementById('micBtn').textContent = '⏹';
  document.getElementById('micBtn').classList.add('recording');

  timerInterval = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
    updateClock(elapsedSeconds, limit);
    if (elapsedSeconds >= limit) stopRecording();
  }, 250);
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('micBtn').classList.remove('recording');

  if ((finalTranscript + interimTranscript).trim().length > 0) {
    document.getElementById('discardBtn').classList.remove('hidden');
    document.getElementById('finishBtn').classList.remove('hidden');
  }
}

function updateLiveWords() {
  const el = document.getElementById('liveWords');
  const text = (finalTranscript + interimTranscript).trim();
  if (text) { el.textContent = text; el.classList.add('has-text'); }
}

document.getElementById('micBtn').addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    finalTranscript = '';
    interimTranscript = '';
    speechTimestamps = [];
    document.getElementById('liveWords').textContent = 'Listening…';
    document.getElementById('liveWords').classList.remove('has-text');
    document.getElementById('discardBtn').classList.add('hidden');
    document.getElementById('finishBtn').classList.add('hidden');
    startRecording();
  }
});

document.getElementById('discardBtn').addEventListener('click', () => {
  finalTranscript = '';
  interimTranscript = '';
  speechTimestamps = [];
  document.getElementById('liveWords').textContent = 'Tap the mic and start talking…';
  document.getElementById('liveWords').classList.remove('has-text');
  document.getElementById('discardBtn').classList.add('hidden');
  document.getElementById('finishBtn').classList.add('hidden');
});

document.getElementById('finishBtn').addEventListener('click', () => {
  stopRecording();
  scoreRound();
});

// ── Scoring (inspired by Goethe-Institut's Sprechen Bewertungskriterien) ──
const FILLER_WORDS = ['äh','ähm','also','halt','irgendwie','sozusagen'];
const CONNECTOR_WORDS = ['und','aber','weil','deshalb','dann','trotzdem','außerdem','denn','also','oder','wenn','obwohl','sondern','während','damit','dadurch','deswegen','allerdings','dafür','dagegen'];

// A small set of very common A1-level words (articles, basic verbs, pronouns,
// everyday nouns). Used only to flag when a B1 answer leans almost entirely
// on beginner vocabulary instead of more developed language — not a
// complete A1 wordlist, just the highest-frequency items.
const A1_BASIC_WORDS = new Set([
  'ich','du','er','sie','es','wir','ihr','der','die','das','ein','eine','einen',
  'ist','sind','war','bin','bist','hat','habe','haben','und','oder','aber',
  'gut','schlecht','groß','klein','schön','mag','mache','machen','gehe','gehen',
  'esse','essen','trinke','trinken','sehe','sehen','sage','sagen','komme','kommen',
  'ja','nein','auch','sehr','viel','wenig','heute','morgen','gestern','immer','nie',
  'hier','dort','jetzt','dann','was','wer','wo','wie','warum','mein','dein','sein',
  'haus','tag','zeit','mensch','kind','mann','frau','arbeit','schule','essen'
]);

// Minimum words expected per rung, tuned per level (B1 expects more than A1 at the same rung number)
const MIN_WORDS = {
  A1: { 1: 4,  2: 6,  3: 9,  4: 13, 5: 17 },
  A2: { 1: 6,  2: 9,  3: 13, 4: 18, 5: 24 },
  B1: { 1: 14, 2: 20, 3: 27, 4: 35, 5: 45 }
};

// Expected distinct-vocabulary ratio (unique words / total words), tuned per level.
// Lower levels are allowed to repeat words more; B1 is expected to vary vocabulary more.
const VOCAB_TARGET_RATIO = { A1: 0.45, A2: 0.55, B1: 0.65 };

const TIERS = [
  { min: 90, label: 'Stark', sub: 'angemessen' },
  { min: 70, label: 'Gut', sub: 'überwiegend angemessen' },
  { min: 50, label: 'Okay', sub: 'in Teilen angemessen' },
  { min: 25, label: 'Ausbaufähig', sub: 'nicht mehr angemessen' },
  { min: 0,  label: 'Schwach', sub: 'nicht mehr verständlich' }
];

function tierFor(score) {
  return TIERS.find(t => score >= t.min) || TIERS[TIERS.length - 1];
}

function scoreRound() {
  const transcript = (finalTranscript + interimTranscript).trim();
  const words = transcript.split(/\s+/).filter(Boolean);
  const wordCount = words.length;
  const limit = getEffectiveTimeLimit();
  const duration = Math.max(1, elapsedSeconds);
  const wpm = wordCount > 0 ? Math.round((wordCount / duration) * 60) : 0;
  const fillerCount = words.filter(w => FILLER_WORDS.includes(w.toLowerCase().replace(/[.,!?]/g, ''))).length;

  const minWords = MIN_WORDS[currentLevel][selectedRung];
  const normalizedWords = words.map(w => w.toLowerCase().replace(/[.,!?]/g, '')).filter(Boolean);
  const transcriptLower = transcript.toLowerCase();

  // 1. Aufgabenerfüllung (Task fulfillment) — combines "did you say enough"
  // with a relevance check against topic keywords expected for this prompt.
  // This is still a heuristic (keyword presence, not real understanding),
  // but it catches the obvious case of rambling about something unrelated.
  const fulfillmentRatio = wordCount / minWords;
  const lengthScore = Math.min(100, fulfillmentRatio * 100);
  const promptKeywords = currentPrompt.keywords || [];
  const matchedKeywords = promptKeywords.filter(kw => transcriptLower.includes(kw.toLowerCase()));
  const relevanceRatio = promptKeywords.length > 0 ? matchedKeywords.length / promptKeywords.length : 1;
  // Even one matched keyword counts for a lot — these are loose topic signals,
  // not an exhaustive checklist, so we don't expect every keyword to appear.
  const relevanceScore = promptKeywords.length > 0
    ? Math.min(100, 40 + relevanceRatio * 200)
    : 100;
  const taskFulfillment = Math.round(lengthScore * 0.5 + Math.min(100, relevanceScore) * 0.5);

  // 2. Flüssigkeit (Fluency) — pace, plus a penalty for long pauses between
  // spoken chunks. Note: pause timing comes from speech-recognition result
  // timestamps, which browsers batch somewhat unpredictably — treat this as
  // a rough signal, not a precise measurement of real silence.
  let longestGapSec = 0;
  for (let i = 1; i < speechTimestamps.length; i++) {
    const gap = (speechTimestamps[i] - speechTimestamps[i - 1]) / 1000;
    if (gap > longestGapSec) longestGapSec = gap;
  }
  let fluencyScore;
  if (wpm === 0) fluencyScore = 0;
  else if (wpm < 40) fluencyScore = (wpm / 40) * 70;
  else if (wpm <= 150) fluencyScore = 100;
  else fluencyScore = Math.max(60, 100 - (wpm - 150) * 0.3);
  const pausePenalty = Math.min(40, Math.max(0, longestGapSec - 3) * 10);
  const fillerPenalty = wordCount > 0 ? Math.min(20, (fillerCount / wordCount) * 100) : 0;
  fluencyScore = Math.max(0, Math.round(fluencyScore - pausePenalty - fillerPenalty));

  // 3. Wortschatz (Vocabulary range) — lexical diversity vs. level-tuned
  // target, plus (B1 only) a check that you're not relying purely on basic
  // A1-level words when more advanced vocabulary would be expected.
  const uniqueWords = new Set(normalizedWords);
  const diversityRatio = normalizedWords.length > 0 ? uniqueWords.size / normalizedWords.length : 0;
  const targetRatio = VOCAB_TARGET_RATIO[currentLevel];
  let vocabScore = Math.round(Math.min(100, (diversityRatio / targetRatio) * 100));
  if (currentLevel === 'B1' && normalizedWords.length > 0) {
    const basicCount = normalizedWords.filter(w => A1_BASIC_WORDS.has(w)).length;
    const basicRatio = basicCount / normalizedWords.length;
    // If the vast majority of words used are A1-level basics, dock the score —
    // some basic words are unavoidable (articles, common verbs), so only
    // penalize when they dominate the answer.
    if (basicRatio > 0.7) {
      vocabScore = Math.round(vocabScore * (1 - (basicRatio - 0.7)));
    }
  }

  // 4. Kohärenz (Coherence) — use of connecting words to link ideas
  const connectorCount = normalizedWords.filter(w => CONNECTOR_WORDS.includes(w)).length;
  const expectedConnectors = Math.max(1, Math.floor(wordCount / 15));
  const coherenceScore = Math.round(Math.min(100, (connectorCount / expectedConnectors) * 100));

  // 5. Korrektheit (Correctness) — can't grammar-check without a paid model call,
  // so this is folded into an estimate based on the other four rather than faked independently.
  const correctnessScore = Math.round((taskFulfillment + fluencyScore + vocabScore + coherenceScore) / 4);

  const criteria = [
    { key: 'erfullung', name: 'Aufgabenerfüllung', desc: 'Length and relevance to the prompt', score: taskFulfillment },
    { key: 'flussigkeit', name: 'Flüssigkeit', desc: 'Pace and smoothness (rough signal)', score: fluencyScore },
    { key: 'wortschatz', name: 'Wortschatz', desc: 'Range and level of vocabulary used', score: vocabScore },
    { key: 'koharenz', name: 'Kohärenz', desc: 'Linking ideas with connectors', score: coherenceScore },
    { key: 'korrektheit', name: 'Korrektheit', desc: 'Estimated overall accuracy', score: correctnessScore }
  ];

  const overallScore = Math.round(criteria.reduce((s, c) => s + c.score, 0) / criteria.length);

  // Pass thresholds: every level now requires every individual criterion to
  // clear its own floor, not just a good average — B1's floor and overall
  // bar are simply higher than A1/A2's.
  let suggestedPass;
  if (currentLevel === 'B1') {
    const allCriteriaAboveFloor = criteria.every(c => c.score >= 70);
    suggestedPass = overallScore >= 80 && allCriteriaAboveFloor;
  } else {
    const allCriteriaAboveFloor = criteria.every(c => c.score >= 60);
    suggestedPass = overallScore >= 60 && allCriteriaAboveFloor;
  }

  lastResult = {
    level: currentLevel,
    rung: selectedRung,
    prompt: currentPrompt.text,
    transcript: transcript || '(no speech detected)',
    wordCount, wpm, fillerCount, duration,
    criteria,
    overallScore,
    suggestedPass,
    pass: suggestedPass,
    date: new Date().toISOString()
  };

  renderResult();
  show('resultScreen');
}

async function translateText(text, fromLang, toLang) {
  if (!text || text.trim().length === 0) return '';
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`;
    const res = await fetch(url);
    const data = await res.json();
    return data?.responseData?.translatedText || '';
  } catch (e) {
    return '';
  }
}

function renderResult() {
  const badge = document.getElementById('resultBadge');
  badge.className = 'result-badge ' + (lastResult.pass ? 'pass' : 'fail');
  badge.textContent = lastResult.pass ? '🎉' : '💪';

  const isFrontier = lastResult.rung === getRungFor(currentLevel);
  document.getElementById('resultTitle').textContent = lastResult.pass ? 'Nice one!' : 'Almost there!';
  document.getElementById('resultSub').textContent = isFrontier
    ? (lastResult.pass ? `Level ${lastResult.rung} cleared — climbing up!` : `Level ${lastResult.rung} — let's try an easier one next.`)
    : `Level ${lastResult.rung} — just practice, your progress is unchanged.`;

  document.getElementById('resultStats').innerHTML = `
    <div class="result-stat"><span class="val">${lastResult.wordCount}</span><span class="lbl">Words</span></div>
    <div class="result-stat"><span class="val">${lastResult.wpm}</span><span class="lbl">WPM</span></div>
    <div class="result-stat"><span class="val">${lastResult.duration}s</span><span class="lbl">Time</span></div>
  `;

  const tierColors = { 'Stark': 'var(--mint)', 'Gut': 'var(--accent)', 'Okay': 'var(--yellow)', 'Ausbaufähig': 'var(--coral)', 'Schwach': 'var(--coral)' };
  document.getElementById('criteriaBox').innerHTML = `
    <div class="overall-score-row">
      <span class="overall-score-label">Overall score</span>
      <span class="overall-score-val">${lastResult.overallScore}/100</span>
    </div>
    ${lastResult.criteria.map(c => {
      const tier = tierFor(c.score);
      const color = tierColors[tier.label] || 'var(--accent)';
      return `
        <div class="criteria-row">
          <div class="criteria-info">
            <p class="criteria-name">${c.name}</p>
            <p class="criteria-desc">${c.desc}</p>
          </div>
          <div class="criteria-bar-wrap"><div class="criteria-bar-fill" style="width:${c.score}%; background:${color};"></div></div>
          <span class="criteria-tier" style="color:${color};">${tier.label}</span>
        </div>
      `;
    }).join('')}
  `;

  document.getElementById('resultPromptOriginal').textContent = lastResult.prompt;
  document.getElementById('resultTranscript').textContent = lastResult.transcript;

  const promptTransEl = document.getElementById('resultPromptTranslation');
  const transcriptTransEl = document.getElementById('resultTranscriptTranslation');
  promptTransEl.textContent = 'Translating…';
  transcriptTransEl.textContent = lastResult.transcript === '(no speech detected)' ? '' : 'Translating…';

  translateText(lastResult.prompt, 'de', 'en').then(t => {
    promptTransEl.textContent = t || '';
  });
  if (lastResult.transcript && lastResult.transcript !== '(no speech detected)') {
    translateText(lastResult.transcript, 'de', 'en').then(t => {
      transcriptTransEl.textContent = t || '';
    });
  }

  const overrideBtn = document.getElementById('overrideToggleBtn');
  overrideBtn.textContent = lastResult.pass
    ? '✓ Marked as Pass — tap to override to Fail'
    : '✗ Marked as Fail — tap to override to Pass';

  const atFrontier = selectedRung === getRungFor(currentLevel);
  document.getElementById('nextBtn').textContent = atFrontier
    ? (lastResult.pass ? 'Climb up →' : 'Drop down →')
    : 'Back to levels →';
}

  renderResult();
});

document.getElementById('nextBtn').addEventListener('click', async () => {
  await saveHistoryEntry(lastResult);
  const highest = getRungFor(currentLevel);
  // Only move the ladder if you were playing at your actual unlocked frontier.
  // Replaying an already-cleared lower level is just practice and doesn't change progress.
  if (selectedRung === highest) {
    let rung = highest;
    if (lastResult.pass) rung = Math.min(RUNG_COUNT, rung + 1);
    else rung = Math.max(1, rung - 1);
    await setRungFor(currentLevel, rung);
    selectedRung = rung;
  }

});

// ── History ───────────────────────────────────────────────
function renderHistoryScreen() {
  const history = getHistory();
  const overviewEl = document.getElementById('overviewStats');

  const totalRounds = history.length;
  const passCount = history.filter(h => h.pass).length;
  const passRate = totalRounds > 0 ? Math.round((passCount / totalRounds) * 100) : 0;
  const totalSeconds = history.reduce((s, h) => s + (h.duration || 0), 0);
  const totalMinutes = Math.round(totalSeconds / 60);

  // Best streak: longest run of consecutive passes, scanning oldest to newest
  let bestStreak = 0, currentStreak = 0;
  for (let i = history.length - 1; i >= 0; i--) {
    if (history[i].pass) { currentStreak++; bestStreak = Math.max(bestStreak, currentStreak); }
    else currentStreak = 0;
  }

  overviewEl.innerHTML = `
    <div class="stat-pill"><span class="num">${totalRounds}</span><span class="label">Rounds</span></div>
    <div class="stat-pill"><span class="num">${totalRounds ? passRate + '%' : '—'}</span><span class="label">Pass rate</span></div>
    <div class="stat-pill"><span class="num">${bestStreak}</span><span class="label">Best streak</span></div>
    <div class="stat-pill"><span class="num">${totalMinutes}m</span><span class="label">Time spoken</span></div>
  `;

  const el = document.getElementById('historyList');
  if (history.length === 0) {
    el.innerHTML = '<div class="empty-state">No rounds played yet. Go climb the ladder!</div>';
    return;
  }
  el.innerHTML = history.map(h => {
    const date = new Date(h.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="history-item">
        <div class="history-top">
          <span class="history-result ${h.pass ? 'pass' : 'fail'}">${h.pass ? '👍' : '👎'} ${h.overallScore != null ? h.overallScore + '/100' : (h.pass ? 'Pass' : 'Try again')}</span>
          <span class="history-meta">${h.level} · Level ${h.rung} · ${date}</span>
        </div>
        <p class="history-prompt">${escapeHtml(h.prompt)}</p>
      </div>
    `;
  }).join('');
}

async function selectProfile(name) {
  name = name.trim();
  if (!name) return;
  const known = getKnownProfiles();
  const existing = known.find(p => p.name === name);
  if (existing) {
    currentAvatar = { emoji: existing.emoji, color: existing.color };
  } else {
    currentAvatar = { emoji: selectedEmoji, color: selectedColor };
    await upsertKnownProfile(name, selectedEmoji, selectedColor);
  }
  profile = name;
  try { localStorage.setItem('spiel-current-profile', profile); } catch (e) {}
  document.getElementById('profileOverlay').classList.add('hidden');
  document.getElementById('profileLabel').innerHTML = avatarChip(currentAvatar.emoji) + ' ' + escapeHtml(profile);
  applyProfileTheme(currentAvatar.color);

  let savedLevel = 'A1';
  try { savedLevel = localStorage.getItem(`spiel-level-${profile}`) || 'A1'; } catch (e) {}
  currentLevel = savedLevel;

  await loadLadder();
  await loadHistory();
  currentRung = getRungFor(currentLevel);
  selectedRung = currentRung;
  renderHome();
  show('homeScreen');
}

document.getElementById('profileGoBtn').addEventListener('click', () => {
  const input = document.getElementById('newProfileInput');
  const name = input.value.trim();
  if (name) selectProfile(name);
});
document.getElementById('newProfileInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('profileGoBtn').click();
});

document.getElementById('switchProfileLink').addEventListener('click', (e) => {
  e.preventDefault();
  showProfilePicker();
});

// ── Edit profile ──────────────────────────────────────────
let editingProfileName = null;
let editingEmoji = null;
let editingColor = null;

function renderEditPickers() {
  const emojiEl = document.getElementById('editEmojiPicker');
  emojiEl.innerHTML = EMOJI_OPTIONS.map(e =>
    `<button type="button" data-emoji="${e}" class="${e === editingEmoji ? 'selected' : ''}">${e}</button>`
  ).join('');
  emojiEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { editingEmoji = b.dataset.emoji; renderEditPickers(); });
  });

  const colorEl = document.getElementById('editColorPicker');
  colorEl.innerHTML = THEME_COLORS.map(c =>
    `<button type="button" data-color="${c}" class="${c === editingColor ? 'selected' : ''}" style="background:${c};"></button>`
  ).join('');
  colorEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { editingColor = b.dataset.color; renderEditPickers(); });
  });
}

function openEditProfileModal(name, emoji, color) {
  editingProfileName = name;
  editingEmoji = emoji || EMOJI_OPTIONS[0];
  editingColor = color || THEME_COLORS[0];
  document.getElementById('editProfileName').value = name;
  renderEditPickers();
  document.getElementById('editProfileOverlay').classList.remove('hidden');
}

document.getElementById('editProfileCancelBtn').addEventListener('click', () => {
  document.getElementById('editProfileOverlay').classList.add('hidden');
});

document.getElementById('editProfileSaveBtn').addEventListener('click', async () => {
  const newName = document.getElementById('editProfileName').value.trim();
  if (!newName || !editingProfileName) return;
  const oldName = editingProfileName;

  if (newName !== oldName) {
    await renameProfile(oldName, newName, editingEmoji, editingColor);
    try {
      const oldLevel = localStorage.getItem(`spiel-level-${oldName}`);
      if (oldLevel !== null) {
        localStorage.setItem(`spiel-level-${newName}`, oldLevel);
        localStorage.removeItem(`spiel-level-${oldName}`);
      }
    } catch (e) {}
  } else {
    await upsertKnownProfile(newName, editingEmoji, editingColor);
  }

  if (profile === oldName) {
    profile = newName;
    currentAvatar = { emoji: editingEmoji, color: editingColor };
    try { localStorage.setItem('spiel-current-profile', profile); } catch (e) {}
    document.getElementById('profileLabel').innerHTML = avatarChip(editingEmoji) + ' ' + escapeHtml(profile);
    applyProfileTheme(editingColor);
    await loadLadder();
    await loadHistory();
    renderHome();
  }

  document.getElementById('editProfileOverlay').classList.add('hidden');
  showProfilePicker();
});

// ── Init ──────────────────────────────────────────────────
initDarkMode();
(async function init() {
  let saved = '';
  try { saved = localStorage.getItem('spiel-current-profile') || ''; } catch (e) {}
  await loadKnownProfiles();
  if (saved && getKnownProfiles().some(p => p.name === saved)) {
    selectProfile(saved);
  } else {
    showProfilePicker();
  }
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then((reg) => {
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') reg.update().catch(() => {});
      });
    }).catch(() => {});

    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}

// iOS install button
(function() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    const btn = document.createElement('button');
    btn.textContent = '⬇️ Add to Home Screen';
    btn.style.cssText = "display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:1.2rem;font-family:'Fraunces',serif;font-size:0.9rem;font-weight:600;background:var(--accent);color:white;border:none;border-radius:14px;padding:0.7rem;cursor:pointer;box-shadow:0 3px 0 var(--accent-shadow);";
    btn.addEventListener('click', () => {
      alert('To install: tap the Share button in Safari\'s toolbar, then choose "Add to Home Screen."');
    });
    const footer = document.querySelector('#homeScreen footer');
    if (footer) footer.parentNode.insertBefore(btn, footer);
  }
})();
</script>
